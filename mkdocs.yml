site_name: My Docs
nav:
  - Home: index.md
  - Kubernetes: kubernetes.md
  - Git: git.md
  - Linux: linux.md
  - Network: network.md
  - Photos: photos.md
  - Raspberry-Pi: raspberry-pi.md
  - Regex: regex.md
  - Windows 11: windows-11.md 

theme:
  name: material
  features:
    - content.code.copy
    
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition